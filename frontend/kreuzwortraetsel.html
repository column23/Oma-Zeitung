<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7a1f1f">
<title>Kreuzworträtsel - Oma-Zeitung</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/games.css">
</head>
<body>
<header class="masthead">
  <div>
    <h1 class="masthead__title">Oma-Zeitung</h1>
    <p class="masthead__date">Kreuzworträtsel des Tages</p>
  </div>
  <div class="masthead__controls">
    <div class="fontsize-group" role="group" aria-label="Schriftgröße">
      <button class="fontsize-btn" data-size="small" title="Kleinere Schrift">A-</button>
      <button class="fontsize-btn" data-size="medium" title="Normale Schrift">A</button>
      <button class="fontsize-btn" data-size="large" title="Größere Schrift">A+</button>
    </div>
  </div>
</header>

<nav class="tabs">
  <a class="tab-link" href="index.html">Titelseite</a>
  <a class="tab-link active" href="spiele.html">Spiele</a>
  <a class="tab-link" href="archiv.html">Archiv</a>
</nav>

<main>
  <div class="section-block">
    <h2 class="section-title">Kreuzworträtsel</h2>
    <p id="crossword-status" class="loading">Rätsel wird geladen ...</p>
    <div class="crossword-wrap">
      <div id="crossword-grid" class="crossword-grid" hidden></div>
      <div id="crossword-clues" class="crossword-clues" hidden>
        <h3>Waagerecht</h3>
        <ul id="clues-across"></ul>
        <h3>Senkrecht</h3>
        <ul id="clues-down"></ul>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="cw-check-btn" hidden>Prüfen</button>
      <a class="btn btn--secondary" href="spiele.html">Zurück zu Spiele</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div>Oma-Zeitung &middot; erscheint täglich</div>
  <div class="ai-badge">Inhalte erstellt mit Künstlicher Intelligenz (Claude)</div>
</footer>

<script src="js/fontsize.js"></script>
<script src="js/swipe-nav.js"></script>
<script src="js/sw-register.js"></script>
<script src="js/games/crossword.js"></script>
</body>
</html>
